name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

permissions:
  contents: write

jobs:
  pipeline:
    name: Lint, Test, Build, and Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.14
        run: |
          uv python install 3.14
          uv python pin 3.14
          rm -rf .venv

      - name: Install System Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            xvfb \
            libegl1 libgl1 \
            libxkbcommon0 libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-xinerama0 libxcb-icccm4 libxcb-keysyms1 \
            libnss3 libnspr4 \
            libfontconfig1 libdbus-1-3 \
            libxcomposite1 libxdamage1 libxrandr2 libxtst6 \
            libxfixes3 libxrender1 libxi6 libxcursor1 \
            libxxf86vm1 libxss1 \
            libasound2t64 libpulse0 libpulse-mainloop-glib0

      - name: Install Python Dependencies
        run: |
          uv venv --seed

          # Install dev dependencies
          .venv/bin/pip install \
            "ruff>=0.15.0" \
            "ty>=0.0.46" \
            "pytest>=8.0.0" \
            "pytest-anki2[anki-2509,qt6-pypi]>=2.0.0"

      - name: Lint
        run: |
          .venv/bin/ruff check .
          .venv/bin/ruff format --check .

      - name: Type Check
        run: .venv/bin/ty check .

      - name: Test
        run: .venv/bin/python -m pytest tests/ -v

      - name: Build
        run: .venv/bin/python build.py all

      # --- RELEASE SECTION (Only runs on master branch push) ---

      - name: Bump Version, Build, Commit, and Tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        id: build_step
        run: |
          NEW_VERSION=$(.venv/bin/python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              v = tomllib.load(f)['project']['version'].split('.')
          v[-1] = str(int(v[-1]) + 1)
          print('.'.join(v))
          ")

          .venv/bin/python -c "
          import re
          with open('pyproject.toml', 'r+') as f:
              c = f.read(); f.seek(0)
              f.write(re.sub(r'^version = \".*\"', f'version = \"$NEW_VERSION\"', c, flags=re.MULTILINE))
              f.truncate()
          "

          .venv/bin/python -c "
          import re
          with open('__init__.py', 'r+') as f:
              c = f.read(); f.seek(0)
              f.write(re.sub(r'^__version__ = \".*\"', f'__version__ = \"$NEW_VERSION\"', c, flags=re.MULTILINE))
              f.truncate()
          "

          .venv/bin/python build.py all

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add pyproject.toml __init__.py
          git commit -m "Bump version to $NEW_VERSION [skip ci]"
          git tag -d "v$NEW_VERSION" 2>/dev/null || true
          git tag "v$NEW_VERSION"
          git push origin master +"refs/tags/v$NEW_VERSION"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.build_step.outputs.tag }}
          name: Release ${{ steps.build_step.outputs.tag }}
          files: build/*.ankiaddon
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}