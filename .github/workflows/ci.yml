name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Lint
        run: uvx ruff check .
      - name: Format check
        run: uvx ruff format . --check
      - name: Type check
        run: uvx ty check .
      - name: Unit tests
        run: uvx pytest tests/ -v --tb=short --ignore=tests/integration

  integration:
    runs-on: ubuntu-latest
    needs: [checks]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxcb-xinerama0 libxcb-xfixes0
      - name: Integration tests
        run: |
          export QT_QPA_PLATFORM=offscreen
          export PYTHONPATH=/usr/lib/python3.14/site-packages
          xvfb-run --server-args="-screen 0 1024x768x24" uv run --group integration pytest tests/integration/ -v --tb=short
      - name: Build
        run: uv run _infra/build.py
      - uses: actions/upload-artifact@v4
        with:
          name: addon-package
          path: build/*.ankiaddon

  release:
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Extract version
        id: version
        run: |
          v=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          name: addon-package
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: build/*.ankiaddon
          generate_release_notes: true
