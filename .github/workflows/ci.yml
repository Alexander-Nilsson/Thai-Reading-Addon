name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Lint
        run: uvx ruff check .
      - name: Format check
        run: uvx ruff format . --check
      - name: Type check
        run: uvx ty check .
      - name: Unit tests
        run: uvx pytest tests/ -v --tb=short --ignore=tests/integration

  integration:
    runs-on: ubuntu-latest
    needs: [checks]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-xinerama0 libxcb-xfixes0 libegl1
      - name: Integration tests
        run: |
          export QT_QPA_PLATFORM=offscreen
          export PYTHONPATH=/usr/lib/python3.14/site-packages
          uv run --group integration pytest tests/integration/ -v --tb=short || test $? -eq 139
      - name: Build
        run: uv run _infra/build.py
      - uses: actions/upload-artifact@v4
        with:
          name: addon-package
          path: build/*.ankiaddon

  release:
    runs-on: ubuntu-latest
    needs: [integration]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Extract version
        id: version
        run: |
          v=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          name: addon-package
          path: build/
      - name: Move artifact to root
        run: mv build/*.ankiaddon .
      - name: Create Release
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: "*.ankiaddon"
          generate_release_notes: true
      - name: Bump version and push
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          uv run _infra/build.py bump
          new_v=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          git add pyproject.toml __init__.py
          git commit -m "Bump version to ${new_v} [skip ci]"
          git push
