name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Lint
        run: uvx ruff check .
      - name: Format check
        run: uvx ruff format . --check
      - name: Type check
        run: uvx ty check .
      - name: Unit tests
        run: uvx pytest tests/ -v --tb=short

  integration:
    runs-on: ubuntu-latest
    needs: [checks]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxcb-xinerama0 libxcb-xfixes0
      - name: Integration tests
        run: |
          export QT_QPA_PLATFORM=offscreen
          export PYTHONPATH=/usr/lib/python3.14/site-packages
          xvfb-run --server-args="-screen 0 1024x768x24" uv run pytest tests/integration/ -v --tb=short
      - name: Build
        run: uv run _infra/build.py
